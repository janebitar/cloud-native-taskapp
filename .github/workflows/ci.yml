name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Check project structure
        run: ls -R

      - name: Install dependencies (if any)
        run: |
          if [ -f package.json ]; then npm install; else echo "No Node project"; fi

      - name: Run tests (optional)
        run: |
          if [ -f package.json ]; then npm test --if-present; else echo "No tests"; fi

      - name: Build app (optional)
        run: |
          if [ -f package.json ]; then npm run build --if-present; else echo "No build step"; fi
