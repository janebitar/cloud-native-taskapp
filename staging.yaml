AWSTemplateFormatVersion: '2010-09-09'
Description: Simple Staging S3 Hosting (Restricted Compatible)

Resources:
  StagingBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "taskapp-staging-${AWS::AccountId}-${AWS::Region}"
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StagingBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: "s3:GetObject"
            Resource: !Sub "${StagingBucket.Arn}/*"

Outputs:
  WebsiteURL:
    Value: !GetAtt StagingBucket.WebsiteURL