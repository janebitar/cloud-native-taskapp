<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Task App</h1>
    <p class="subtitle">A small cloud-native demo app</p>

    <form id="task-form">
      <input type="text" id="task-input" placeholder="What needs doing?" required />
      <button type="submit">Add</button>
    </form>

    <p id="error-message" class="error"></p>

    <ul id="task-list"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
